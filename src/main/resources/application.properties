# ──────────────────────────────────────────────
# Al-Muneer Portal — Application Configuration
# ──────────────────────────────────────────────

spring.application.name=almuneer-portal

# ── Database ──
spring.datasource.url=jdbc:postgresql://localhost:5432/almuneer_portal
spring.datasource.username=almuneer
spring.datasource.password=almuneer_dev
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Thymeleaf ──
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── File Uploads ──
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.gallery-dir=uploads/gallery
app.upload.proofs-dir=uploads/proofs

# ── Google Maps (venue location) ──
# Share link from Google Maps — used for "Open in Maps" buttons
app.maps.share-url=https://share.google/gGyZPRG6CbJQz0eVc
# Embed iframe (resolved from share link: قاعة المنير للأفراح والمناسبات, Ibb)
app.maps.embed-url=https://www.google.com/maps?q=%D9%82%D8%A7%D8%B9%D8%A9+%D8%A7%D9%84%D9%85%D9%86%D9%8A%D8%B1+%D9%84%D9%84%D8%A3%D9%81%D8%B1%D8%A7%D8%AD+%D9%88%D8%A7%D9%84%D9%85%D9%86%D8%A7%D8%B3%D8%A8%D8%A7%D8%AA+%D8%A5%D8%A8&output=embed

# ── Phone / Regional ──
# Country dialling code prepended to all visitor phone numbers.
# Change this if the portal is deployed outside Yemen.
app.country.code=+967

# ── JWT ──
app.jwt.secret=al-muneer-portal-jwt-secret-key-change-in-production-min-256-bits-long!!
app.jwt.expiration-ms=86400000

# ── Server ──
server.port=8080
server.error.whitelabel.enabled=false

# ── AI (Gemini) ──
# Replace with your actual Gemini API key from https://aistudio.google.com/
app.gemini.api-key=AIzaSyCdvpCEoOMjB0UAoB-OzpdSqATt7Uv6_Ck
