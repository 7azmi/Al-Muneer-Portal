# ──────────────────────────────────────────────
# Al-Muneer Portal — Application Configuration
# ──────────────────────────────────────────────

spring.application.name=almuneer-portal

# ── Database ──
spring.datasource.url=jdbc:postgresql://localhost:5432/almuneer_portal
spring.datasource.username=almuneer
spring.datasource.password=almuneer_dev
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Thymeleaf ──
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── File Uploads ──
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.gallery-dir=uploads/gallery
app.upload.proofs-dir=uploads/proofs

# ── JWT ──
app.jwt.secret=al-muneer-portal-jwt-secret-key-change-in-production-min-256-bits-long!!
app.jwt.expiration-ms=86400000

# ── Server ──
server.port=8080
server.error.whitelabel.enabled=false
