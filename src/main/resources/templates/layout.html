<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Al-Muneer Hall for Weddings and Events — Ibb, Yemen. Book your dream event venue online.">
    <title layout:title-pattern="$CONTENT_TITLE - Al-Muneer Hall">Al-Muneer Hall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <nav class="navbar" id="main-nav">
        <div class="nav-container">
            <a href="/#hero" class="nav-logo" id="nav-logo">
                <span class="logo-icon">✦</span>
                <span class="logo-text">Al-Muneer</span>
            </a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="/#hero" data-section="hero">Home</a></li>
                <li><a href="/#venue" data-section="venue">Venue</a></li>
                <li><a href="/#gallery" data-section="gallery">Gallery</a></li>
                <li><a href="/#availability" data-section="availability" class="nav-cta">Book</a></li>
                <li><a href="/#pricing" data-section="pricing">Pricing</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content" layout:fragment="content">
    </main>

    <footer class="footer" id="site-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <span class="logo-icon">✦</span>
                <span>Al-Muneer Hall</span>
            </div>
            <p class="footer-tagline">Ibb, Yemen — Weddings &amp; Events</p>
            <div class="footer-links">
                <a href="/#venue">Venue</a>
                <a href="/#gallery">Gallery</a>
                <a href="/#availability">Book</a>
                <a href="/#pricing">Pricing</a>
            </div>
            <p class="footer-copy">&copy; 2026 Al-Muneer Hall. All rights reserved.</p>
        </div>
    </footer>

    <script th:src="@{/js/main.js}"></script>
    <script layout:fragment="scripts"></script>
</body>
</html>
