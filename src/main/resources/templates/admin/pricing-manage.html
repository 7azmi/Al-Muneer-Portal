<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: admin-layout('Pricing', 'pricing', ~{::adminContent})}">
<body>
<div th:fragment="adminContent">
    <div class="admin-page-header">
        <h1 class="admin-page-title">Manage Pricing</h1>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}">Success</div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}">Error</div>

    <!-- Add/Edit Tier Form -->
    <div class="admin-panel">
        <h3 class="admin-panel-title" th:text="${newTier.pricingId != null ? 'Edit Pricing Tier' : 'Add New Pricing Tier'}">Add New Pricing Tier</h3>
        <form method="post" th:action="@{/admin/pricing/save}" th:object="${newTier}" id="pricing-form">
            <input type="hidden" th:field="*{pricingId}">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label class="form-label" for="tierName">Package Name</label>
                    <input type="text" id="tierName" name="tierName" class="form-input"
                           th:value="${newTier.tierName}" placeholder="e.g. Gold Package" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="basePrice">Price (YER)</label>
                    <input type="number" id="basePrice" name="basePrice" class="form-input"
                           th:value="${newTier.basePrice}" placeholder="e.g. 500000" step="1000" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="tier-description">Description / Features</label>
                <textarea id="tier-description" name="description" class="form-textarea" rows="3"
                          th:text="${newTier.description}" placeholder="List features, one per line"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">
                    <input type="checkbox" th:field="*{isActive}">
                    Active (visible to visitors)
                </label>
            </div>
            <button type="submit" class="btn btn-primary" id="save-pricing-btn">Save Tier</button>
            <a th:if="${newTier.pricingId != null}" href="/admin/pricing" class="btn btn-outline" style="margin-left:0.5rem;">Cancel Edit</a>
        </form>
    </div>

    <!-- Existing Tiers Table -->
    <div class="admin-panel">
        <h3 class="admin-panel-title">Existing Tiers (<span th:text="${tiers.size()}">0</span>)</h3>
        <table class="admin-table" th:if="${!tiers.isEmpty()}">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Price (YER)</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="tier : ${tiers}">
                    <td th:text="${tier.tierName}">Name</td>
                    <td th:text="${#numbers.formatDecimal(tier.basePrice, 0, 0)}">0</td>
                    <td>
                        <span th:if="${tier.isActive}" class="badge badge-active">Active</span>
                        <span th:unless="${tier.isActive}" class="badge badge-inactive">Inactive</span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/pricing/edit/' + ${tier.pricingId}}" class="btn btn-outline btn-sm">Edit</a>
                        <form method="post" th:action="@{'/admin/pricing/delete/' + ${tier.pricingId}}"
                              style="display:inline;" onsubmit="return confirm('Delete this tier?');">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${tiers.isEmpty()}" class="empty-state">
            <p class="text-muted">No pricing tiers yet. Add one above.</p>
        </div>
    </div>
</div>
</body>
</html>
