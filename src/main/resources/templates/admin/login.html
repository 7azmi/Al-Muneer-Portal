<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Al-Muneer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="admin-login-page">
        <div class="admin-login-card">
            <span class="logo-icon">✦</span>
            <h1>Admin Dashboard</h1>
            <p class="admin-login-subtitle">Al-Muneer Hall Management</p>

            <div th:if="${error}" class="alert alert-error" th:text="${error}">Error</div>

            <form method="post" th:action="@{/admin/login}" id="admin-login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input"
                           placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input"
                           placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="login-submit"
                        style="width:100%; justify-content:center; margin-top: 0.5rem;">
                    Sign In
                </button>
            </form>

            <p class="text-center mt-6" style="font-size: 0.8rem; color: var(--color-text-muted);">
                <a href="/">← Back to website</a>
            </p>
        </div>
    </div>
</body>
</html>
