<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: admin-layout('Venue Info', 'venue', ~{::adminContent})}">
<body>
<div th:fragment="adminContent">
    <div class="admin-page-header">
        <h1 class="admin-page-title">Manage Venue Info</h1>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}">Success</div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}">Error</div>

    <div class="admin-panel">
        <h3 class="admin-panel-title">Edit Venue Information</h3>
        <form method="post" th:action="@{/admin/venue}" th:object="${venue}" id="venue-edit-form">
            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea id="description" name="description" class="form-textarea" rows="4"
                          th:text="${venue.description}" placeholder="Venue description"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label" for="services">Services</label>
                <textarea id="services" name="services" class="form-textarea" rows="3"
                          th:text="${venue.services}" placeholder="Comma-separated services"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label" for="capacity">Capacity (Guests)</label>
                <input type="number" id="capacity" name="capacity" class="form-input"
                       th:value="${venue.capacity}" placeholder="e.g. 500">
            </div>
            <div class="form-group">
                <label class="form-label" for="location">Location</label>
                <input type="text" id="location" name="location" class="form-input"
                       th:value="${venue.location}" placeholder="e.g. Ibb, Yemen">
            </div>
            <div class="form-group">
                <label class="form-label" for="contactInfo">Contact Info</label>
                <input type="text" id="contactInfo" name="contactInfo" class="form-input"
                       th:value="${venue.contactInfo}" placeholder="Phone / WhatsApp number">
            </div>
            <button type="submit" class="btn btn-primary" id="save-venue-btn">Save Changes</button>
        </form>
    </div>
</div>
</body>
</html>
