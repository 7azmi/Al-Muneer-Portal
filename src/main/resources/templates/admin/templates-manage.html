<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: admin-layout('Message Templates', 'templates', ~{::adminContent})}">
<body>
<div th:fragment="adminContent">
    <div class="admin-page-header">
        <h1 class="admin-page-title">Notification Templates</h1>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
        <!-- Edit Form -->
        <div class="admin-panel">
            <h3 class="admin-panel-title"
                th:text="${editing != null ? 'Edit Template: ' + editing.label : 'Select a template to edit'}">
                Edit Template
            </h3>
            <div th:if="${editing != null}">
                <form method="post" action="/admin/templates/save" id="template-save-form">
                    <input type="hidden" name="templateId" th:value="${editing.templateId}">
                    <input type="hidden" name="eventName" th:value="${editing.eventName}">
                    <div class="form-group">
                        <label class="form-label">Event Name (read-only)</label>
                        <input type="text" class="form-input" th:value="${editing.eventName}" disabled>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="tmpl-label">Label</label>
                        <input type="text" id="tmpl-label" name="label" class="form-input"
                               th:value="${editing.label}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="tmpl-text">Message Template</label>
                        <textarea id="tmpl-text" name="templateText" class="form-textarea" rows="8"
                                  required th:text="${editing.templateText}"></textarea>
                        <small class="text-muted">
                            Available placeholders:
                            <code>{visitorName}</code>,
                            <code>{inquiryId}</code>,
                            <code>{eventDate}</code>,
                            <code>{status}</code>
                        </small>
                    </div>
                    <button type="submit" class="btn btn-primary" id="save-template-btn">Save Template</button>
                    <a href="/admin/templates" class="btn btn-outline" style="margin-left:0.5rem;">Cancel</a>
                </form>
            </div>
            <div th:unless="${editing != null}" class="empty-state">
                <div class="empty-state-icon">💌</div>
                <p class="empty-state-text">Click "Edit" on a template from the list to modify it.</p>
            </div>
        </div>

        <!-- Template List -->
        <div class="admin-panel">
            <h3 class="admin-panel-title">Templates (<span th:text="${templates.size()}">0</span>)</h3>
            <div th:each="tmpl : ${templates}"
                 style="padding: 1rem; border: 1px solid var(--color-border); border-radius: 8px; margin-bottom: 0.75rem;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.5rem;">
                    <div>
                        <strong th:text="${tmpl.label}">Label</strong><br>
                        <small class="text-muted" th:text="${tmpl.eventName}">EVENT_NAME</small>
                    </div>
                    <a th:href="@{'/admin/templates/edit/' + ${tmpl.templateId}}"
                       class="btn btn-outline btn-sm">Edit</a>
                </div>
                <p class="text-muted" style="font-size: 0.8rem; white-space: pre-wrap; line-height: 1.5;"
                   th:text="${#strings.abbreviate(tmpl.templateText, 120)}">Text...</p>
                <small class="text-muted">
                    Last updated: <span th:text="${#temporals.format(tmpl.updatedAt, 'dd MMM yyyy HH:mm')}"></span>
                </small>
            </div>
            <div th:if="${templates.isEmpty()}" class="empty-state">
                <p class="empty-state-text">No templates found.</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
