<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: admin-layout('Payments', 'payments', ~{::adminContent})}">
<body>
<div th:fragment="adminContent">
    <div class="admin-page-header" style="flex-wrap:wrap; gap:0.75rem;">
        <h1 class="admin-page-title">
            Payment Proofs
            <span th:if="${filterInquiryId != null}" style="font-size:0.9rem; font-weight:400; color:var(--color-text-muted);">
                — Inquiry #<span th:text="${filterInquiryId}"></span>
            </span>
        </h1>
        <div style="display:flex; gap:0.5rem;">
            <a th:if="${filterInquiryId != null}" th:href="@{'/admin/inquiries/' + ${filterInquiryId}}"
               class="btn btn-outline btn-sm">← Inquiry</a>
            <a th:if="${filterInquiryId != null}" href="/admin/payments" class="btn btn-outline btn-sm">Show all proofs</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="admin-panel">
        <h3 class="admin-panel-title">
            <span th:if="${filterInquiryId == null}">All Payment Proofs</span>
            <span th:if="${filterInquiryId != null}">Proofs for this inquiry</span>
            (<span th:text="${proofs.size()}">0</span>)
        </h3>
        <table class="admin-table" th:if="${!proofs.isEmpty()}">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Inquiry ID</th>
                    <th>Visitor</th>
                    <th>Event Date</th>
                    <th>Uploaded</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="proof : ${proofs}">
                    <td th:text="${proof.proofId}">1</td>
                    <td>
                        <a th:href="@{'/admin/inquiries/' + ${proof.inquiry.inquiryId}}"
                           th:text="'#' + ${proof.inquiry.inquiryId}"></a>
                    </td>
                    <td th:text="${proof.inquiry.visitorName}">Name</td>
                    <td th:text="${proof.inquiry.slot?.slotDate}">Date</td>
                    <td th:text="${#temporals.format(proof.uploadTimestamp, 'dd MMM yyyy HH:mm')}">Time</td>
                    <td>
                        <span class="badge"
                              th:classappend="${proof.verificationStatus.name() == 'VERIFIED'} ? 'badge-active' :
                                             (${proof.verificationStatus.name() == 'REJECTED'} ? 'badge-inactive' : '')"
                              th:text="${proof.verificationStatus}">Status</span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/payments/' + ${proof.proofId}}" class="btn btn-outline btn-sm">Review</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${proofs.isEmpty()}" class="empty-state">
            <div class="empty-state-icon">💳</div>
            <p class="empty-state-text">No payment proofs submitted yet.</p>
        </div>
    </div>
</div>
</body>
</html>
