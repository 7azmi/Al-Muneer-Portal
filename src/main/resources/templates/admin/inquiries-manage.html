<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: admin-layout('Inquiries', 'inquiries', ~{::adminContent})}">
<body>
<div th:fragment="adminContent">

    <div class="admin-page-header">
        <h1 class="admin-page-title">Booking Inquiries</h1>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <!-- ── Status filter bar ──────────────────────────────────────────── -->
    <div style="display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:1.5rem; align-items:center;">

        <!-- Active (default) -->
        <a href="/admin/inquiries"
           class="filter-chip"
           th:classappend="${activeFilter == 'active'} ? ' filter-chip-active'">
            🔵 Active
        </a>

        <!-- Per-status chips -->
        <a th:each="s : ${statuses}"
           th:href="@{/admin/inquiries(filter=${s.name()})}"
           class="filter-chip"
           th:classappend="${activeFilter == s.name()} ? ' filter-chip-active'"
           th:text="${s.name().replace('_',' ')} + ' (' + ${counts[s.name()]} + ')'">
        </a>

        <!-- Show all -->
        <a href="/admin/inquiries?filter=all"
           class="filter-chip"
           th:classappend="${activeFilter == 'all'} ? ' filter-chip-active'">
            📋 All
        </a>
    </div>

    <!-- ── Table ──────────────────────────────────────────────────────── -->
    <div class="admin-panel" style="padding:0; overflow:hidden;">
        <div style="padding:1rem 1.5rem; border-bottom:1px solid var(--color-border);
                    display:flex; justify-content:space-between; align-items:center;">
            <h3 class="admin-panel-title" style="margin:0;">
                <span th:text="${inquiries.size()}">0</span> result(s)
                <span class="text-muted" style="font-size:0.8rem; font-weight:400;"
                      th:if="${activeFilter == 'active'}"> — completed &amp; cancelled hidden</span>
            </h3>
            <!-- Quick search (client-side) -->
            <input type="text" id="table-search" class="form-input"
                   placeholder="🔍 Search name / number..." style="max-width:220px;"
                   oninput="filterTable(this.value)">
        </div>

        <div th:if="${inquiries.isEmpty()}" class="empty-state" style="padding:3rem;">
            <div class="empty-state-icon">📋</div>
            <p class="empty-state-text">No inquiries match the current filter.</p>
            <a href="/admin/inquiries?filter=all" class="btn btn-outline btn-sm" style="margin-top:0.5rem;">
                Show all inquiries
            </a>
        </div>

        <div th:unless="${inquiries.isEmpty()}" style="overflow-x:auto;">
            <table class="admin-table" id="inquiries-table">
                <thead>
                    <tr>
                        <th>Ref Code</th>
                        <th>Name</th>
                        <th>WhatsApp</th>
                        <th>Event Date</th>
                        <th>Type</th>
                        <th>Guests</th>
                        <th>Status</th>
                        <th>Submitted</th>
                        <th style="width:80px;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="inq : ${inquiries}" class="inq-row">
                        <td style="font-variant-numeric:tabular-nums; font-weight:600; color:var(--color-primary);"
                            th:text="${inq.referenceCode}">REF</td>
                        <td th:text="${inq.visitorName}">Name</td>
                        <td style="font-size:0.85rem;" th:text="${inq.visitorWhatsApp}">WA</td>
                        <td th:text="${inq.slot?.slotDate}">Date</td>
                        <td th:text="${inq.eventType ?: '—'}">Type</td>
                        <td th:text="${inq.numGuests ?: '—'}">0</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${inq.status.name() == 'NEW'} ? 'badge-new' :
                                                 (${inq.status.name() == 'CONFIRMED'} ? 'badge-active' :
                                                 (${inq.status.name().startsWith('CANCELLED')} ? 'badge-inactive' :
                                                 (${inq.status.name() == 'PAYMENT_PENDING'} ? 'badge-pending' : '')))"
                                  th:text="${inq.status.name().replace('_',' ')}">Status</span>
                        </td>
                        <td style="font-size:0.8rem;"
                            th:text="${#temporals.format(inq.submissionDate, 'dd MMM yy, HH:mm')}">Date</td>
                        <td>
                            <a th:href="@{'/admin/inquiries/' + ${inq.inquiryId}}"
                               class="btn btn-outline btn-sm">Open</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <style>
        .filter-chip {
            display: inline-flex; align-items: center; padding: 0.3rem 0.85rem;
            border-radius: 999px; font-size: 0.8rem; font-weight: 500;
            background: var(--color-surface-2); color: var(--color-text-muted);
            border: 1px solid var(--color-border); text-decoration: none;
            transition: all 0.15s ease;
        }
        .filter-chip:hover { background: var(--color-surface); color: var(--color-text); }
        .filter-chip-active {
            background: var(--color-primary); color: #fff !important;
            border-color: var(--color-primary);
        }
        .badge-pending {
            background: rgba(234,179,8,0.15); color: #b45309; border-color: rgba(234,179,8,0.3);
        }
    </style>

    <script>
        function filterTable(query) {
            const q = query.toLowerCase();
            document.querySelectorAll('#inquiries-table .inq-row').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(q) ? '' : 'none';
            });
        }
    </script>
</div>
</body>
</html>
