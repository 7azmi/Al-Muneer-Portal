<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="admin-layout(pageTitle, activeNav, pageContent)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Admin'">Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="admin-sidebar-header">
                <a href="/admin/dashboard" style="display:flex; align-items:center; gap:0.5rem; color:inherit; text-decoration:none;">
                    <span class="logo-icon">✦</span>
                    <span>Admin Panel</span>
                </a>
            </div>
            <ul class="admin-nav">
                <li><a href="/admin/dashboard" th:classappend="${activeNav == 'dashboard'} ? 'active'">
                    <span class="nav-icon">📊</span> Dashboard
                </a></li>
                <li><a href="/admin/venue" th:classappend="${activeNav == 'venue'} ? 'active'">
                    <span class="nav-icon">🏛️</span> Venue Info
                </a></li>
                <li><a href="/admin/gallery" th:classappend="${activeNav == 'gallery'} ? 'active'">
                    <span class="nav-icon">🖼️</span> Gallery Media
                </a></li>
                <li><a href="/admin/gallery/labels" th:classappend="${activeNav == 'gallery-labels'} ? 'active'">
                    <span class="nav-icon">🏷️</span> Gallery Labels
                </a></li>
                <li><a href="/admin/pricing" th:classappend="${activeNav == 'pricing'} ? 'active'">
                    <span class="nav-icon">💰</span> Pricing
                </a></li>
                <li><a href="/admin/calendar" th:classappend="${activeNav == 'calendar'} ? 'active'">
                    <span class="nav-icon">📅</span> Calendar
                </a></li>
                <li><a href="/admin/inquiries" th:classappend="${activeNav == 'inquiries'} ? 'active'">
                    <span class="nav-icon">📋</span> Inquiries
                </a></li>
                <li><a href="/admin/payments" th:classappend="${activeNav == 'payments'} ? 'active'">
                    <span class="nav-icon">💳</span> Payments
                </a></li>
                <li><a href="/admin/feedback" th:classappend="${activeNav == 'feedback'} ? 'active'">
                    <span class="nav-icon">💬</span> Feedback
                </a></li>
                <li><a href="/admin/reports" th:classappend="${activeNav == 'reports'} ? 'active'">
                    <span class="nav-icon">📈</span> Reports
                </a></li>
                <li><a href="/admin/analytics" th:classappend="${activeNav == 'analytics'} ? 'active'">
                    <span class="nav-icon">👁️</span> Analytics
                </a></li>
                <li><a href="/admin/templates" th:classappend="${activeNav == 'templates'} ? 'active'">
                    <span class="nav-icon">💌</span> Templates
                </a></li>
                <li style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--color-border);">
                    <a href="/admin/logout">
                        <span class="nav-icon">🚪</span> Logout
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <div class="admin-main">
            <th:block th:insert="${pageContent}" />
        </div>
    </div>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
