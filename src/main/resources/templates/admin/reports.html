<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin-layout :: admin-layout('Reports', 'reports', ~{::adminContent})}">
<body>
<div th:fragment="adminContent">
    <div class="admin-page-header">
        <h1 class="admin-page-title">Reports & Analytics Summary</h1>
    </div>

    <!-- Date Filter Form -->
    <div class="admin-panel" style="margin-bottom: 1.5rem;">
        <form method="get" style="display: grid; grid-template-columns: 1fr 1fr 150px; gap: 1rem; align-items: flex-end;">
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.85rem;">From Date</label>
                <input type="date" name="fromDate" th:value="${fromDate}" style="width: 100%; padding: 0.5rem; border: 1px solid var(--color-border); border-radius: 6px;">
            </div>
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.85rem;">To Date</label>
                <input type="date" name="toDate" th:value="${toDate}" style="width: 100%; padding: 0.5rem; border: 1px solid var(--color-border); border-radius: 6px;">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                <button type="submit" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.85rem;">Filter</button>
                <a href="/admin/reports" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.85rem; text-align: center; text-decoration: none;">Reset</a>
            </div>
        </form>
    </div>

    <div class="admin-stats">
        <!-- Inquiry Stats -->
        <div class="stat-card">
            <div class="stat-label">Total Inquiries</div>
            <div class="stat-value" th:text="${report['totalInquiries']}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Confirmed Bookings</div>
            <div class="stat-value" th:text="${report['confirmedBookings']}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Completed Events</div>
            <div class="stat-value" th:text="${report['completedEvents']}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">New (Unread)</div>
            <div class="stat-value" th:text="${report['newInquiries']}">0</div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem;">
        <!-- Inquiry Status Chart -->
        <div class="admin-panel">
            <h3 class="admin-panel-title">📊 Inquiry Status Breakdown</h3>
            <canvas id="inquiryStatusChart" style="max-height: 300px;"></canvas>
        </div>

        <!-- Payment Status Chart -->
        <div class="admin-panel">
            <h3 class="admin-panel-title">💳 Payment Status</h3>
            <canvas id="paymentStatusChart" style="max-height: 300px;"></canvas>
        </div>

        <!-- Feedback Ratings Chart -->
        <div class="admin-panel" style="grid-column: 1 / -1;">
            <h3 class="admin-panel-title">⭐ Feedback Ratings Distribution</h3>
            <canvas id="feedbackRatingsChart" style="max-height: 300px;"></canvas>
        </div>
    </div>

    <script th:src="@{/js/admin-charts.js}"></script>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', () => {
            const inquiryStatusData = [[${report['inquiryStatusBreakdown']}]];
            const paymentStatusData = [[${report['paymentStatusBreakdown']}]];
            const feedbackRatingsData = [[${report['feedbackRatings']}]];

            if (inquiryStatusData && inquiryStatusData.length > 0) {
                renderInquiryStatusChart('inquiryStatusChart', inquiryStatusData);
            }

            if (paymentStatusData && paymentStatusData.length > 0) {
                renderPaymentStatusChart('paymentStatusChart', paymentStatusData);
            }

            if (feedbackRatingsData && feedbackRatingsData.length > 0) {
                renderFeedbackRatingsChart('feedbackRatingsChart', feedbackRatingsData);
            }
        });
    </script>
</div>
</body>
</html>
