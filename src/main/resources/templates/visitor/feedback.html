<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Leave Feedback</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section" id="feedback-page">
        <div class="section-container" style="max-width: 640px;">
            <div class="section-header">
                <h1 class="section-title">Share Your Feedback</h1>
                <p class="section-subtitle">We value your experience — help us improve</p>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <div class="card" style="padding: 2rem;">
                <form method="post" action="/feedback/submit" id="feedback-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label" for="fb-name">Full Name *</label>
                            <input type="text" id="fb-name" name="visitorName" class="form-input"
                                   placeholder="Your name" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="fb-wa">WhatsApp Number *</label>
                            <input type="tel" id="fb-wa" name="visitorWhatsApp" class="form-input"
                                   placeholder="+967XXXXXXXXX" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Overall Rating *</label>
                        <div style="display: flex; gap: 0.5rem; margin-top: 0.25rem;" id="star-rating">
                            <label th:each="i : ${#numbers.sequence(1,5)}" style="cursor: pointer; font-size: 2rem;">
                                <input type="radio" name="rating" th:value="${i}"
                                       style="display:none;"
                                       th:checked="${i == 5}">
                                <span class="star" th:data-value="${i}">⭐</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="fb-text">Your Feedback *</label>
                        <textarea id="fb-text" name="feedbackText" class="form-textarea" rows="4"
                                  placeholder="Tell us about your experience at Al-Muneer Hall..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" id="submit-feedback-btn"
                            style="width: 100%; margin-top: 0.5rem;">
                        Submit Feedback →
                    </button>
                </form>
            </div>
        </div>
    </section>
</main>
<th:block layout:fragment="scripts">
<script>
    // Simple star rating UX
    document.querySelectorAll('.star').forEach(star => {
        star.addEventListener('mouseenter', () => {
            const val = parseInt(star.dataset.value);
            document.querySelectorAll('.star').forEach((s, i) => {
                s.style.opacity = (i + 1) <= val ? '1' : '0.3';
            });
        });
        star.addEventListener('click', () => {
            const val = parseInt(star.dataset.value);
            star.closest('label').querySelector('input').checked = true;
        });
    });
    document.getElementById('star-rating').addEventListener('mouseleave', () => {
        document.querySelectorAll('.star').forEach(s => s.style.opacity = '1');
    });
</script>
</th:block>
</body>
</html>
