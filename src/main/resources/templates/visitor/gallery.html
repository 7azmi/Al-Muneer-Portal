<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Gallery</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section" id="gallery-page">
        <div class="section-container">
            <div class="section-header">
                <h1 class="section-title">Gallery</h1>
                <p class="section-subtitle">Explore Al-Muneer Hall through photos and moments</p>
            </div>

            <!-- ── Dynamic filter bar from DB labels ─────────────────── -->
            <div class="gallery-filters" id="gallery-filters">
                <a href="/gallery?category=all"
                   class="filter-btn"
                   th:classappend="${activeCategory == 'all'} ? ' active'">All</a>

                <a th:each="lbl : ${galleryLabels}"
                   th:href="@{/gallery(category=${lbl.name})}"
                   class="filter-btn"
                   th:classappend="${activeCategory == lbl.name} ? ' active'"
                   th:text="${lbl.icon != null and !lbl.icon.isBlank() ? lbl.icon + ' ' : ''} + ${lbl.name}">
                </a>
            </div>

            <!-- ── Masonry gallery ────────────────────────────────────── -->
            <div class="masonry-grid" th:if="${!mediaItems.isEmpty()}" id="gallery-grid">
                <div th:each="item,iterStat : ${mediaItems}"
                     class="masonry-item"
                     th:data-index="${iterStat.index}"
                     th:data-type="${item.mediaType}"
                     th:data-src="${item.mediaType.name() == 'IMAGE' ? '/uploads/gallery/' + item.fileName : ''}"
                     th:data-url="${item.youtubeUrl}"
                     th:data-caption="${item.caption}">

                    <!-- Image -->
                    <div th:if="${item.mediaType.name() == 'IMAGE'}" class="masonry-media">
                        <img th:src="@{'/uploads/gallery/' + ${item.fileName}}"
                             th:alt="${item.caption ?: 'Gallery image'}"
                             loading="lazy">
                    </div>

                    <!-- YouTube -->
                    <div th:if="${item.mediaType.name() == 'YOUTUBE'}" class="masonry-media youtube-thumb">
                        <img th:src="'https://img.youtube.com/vi/' + ${item.youtubeVideoId} + '/hqdefault.jpg'"
                             alt="Video thumbnail" loading="lazy">
                        <span class="play-icon">▶</span>
                    </div>

                    <!-- Label badge -->
                    <span th:if="${item.category != null and !item.category.isBlank()}"
                          class="masonry-label" th:text="${item.category}"></span>

                    <div class="caption-overlay" th:if="${item.caption != null}" th:text="${item.caption}"></div>
                </div>
            </div>

            <!-- Empty State -->
            <div class="empty-state" th:if="${mediaItems.isEmpty()}">
                <div class="empty-state-icon">🖼️</div>
                <p class="empty-state-text">No media items yet. Check back soon!</p>
            </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" aria-label="Close" id="lightbox-close">&times;</button>
        <div class="lightbox-main">
            <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous">&lsaquo;</button>
            <div class="lightbox-content-wrapper">
                <div class="lightbox-content" id="lightbox-content"></div>
                <div class="lightbox-caption" id="lightbox-caption"></div>
            </div>
            <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next">&rsaquo;</button>
        </div>
        <div class="lightbox-thumbnails-container">
            <div class="lightbox-thumbnails" id="lightbox-thumbnails"></div>
        </div>
    </div>
</main>

<th:block layout:fragment="scripts">
<style>
/* ── Masonry via CSS columns ─────────────────────────────── */
.masonry-grid {
    column-count: 4;
    column-gap: 14px;
    animation: fadeIn 0.6s ease;
}

@media (max-width: 1100px) { .masonry-grid { column-count: 3; } }
@media (max-width: 720px)  { .masonry-grid { column-count: 2; } }
@media (max-width: 420px)  { .masonry-grid { column-count: 1; } }

.masonry-item {
    break-inside: avoid;
    margin-bottom: 14px;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    background: var(--color-surface-card);
    transition: transform 0.35s cubic-bezier(0.165, 0.84, 0.44, 1),
                box-shadow 0.35s ease;
    display: block;
}

.masonry-item:hover {
    transform: translateY(-5px) scale(1.01);
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    z-index: 5;
}

.masonry-media {
    display: block;
    width: 100%;
    line-height: 0;
    position: relative;
}

.masonry-media img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.5s ease;
}

.masonry-item:hover .masonry-media img { transform: scale(1.05); }

/* Tall items: span 2 visual rows using a padding trick on every 5th item */
.masonry-item[data-size="tall"] .masonry-media img {
    min-height: 340px;
    object-fit: cover;
}
.masonry-item[data-size="wide"] .masonry-media img {
    min-height: 200px;
    object-fit: cover;
}

/* YouTube thumbs keep 16:9 */
.masonry-item .youtube-thumb { position: relative; }
.masonry-item .youtube-thumb img { aspect-ratio: 16/9; object-fit: cover; }
.masonry-item .play-icon {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    font-size: 3rem;
    background: rgba(201,168,76,0.75);
    transition: background 0.2s ease;
}
.masonry-item:hover .play-icon { background: rgba(201,168,76,0.95); }

/* Caption overlay */
.masonry-item .caption-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 1.5rem 0.75rem 0.6rem;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 100%);
    color: #fff; font-size: 0.8rem; font-weight: 500;
    opacity: 0; transform: translateY(8px);
    transition: all 0.3s ease;
}
.masonry-item:hover .caption-overlay { opacity: 1; transform: translateY(0); }

/* Label badge */
.masonry-label {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.85);
    font-size: 0.65rem; letter-spacing: 0.06em;
    text-transform: uppercase; font-weight: 600;
    padding: 3px 7px; border-radius: 999px;
    backdrop-filter: blur(4px);
}
</style>
<script>
(function () {
    // ── Assign sizes for visual variety ──────────────────────────
    const sizePattern = ['normal','normal','tall','normal','wide','normal','tall','normal','normal','wide'];
    document.querySelectorAll('.masonry-item').forEach((item, i) => {
        item.dataset.size = sizePattern[i % sizePattern.length];
    });

    // ── Lightbox ──────────────────────────────────────────────────
    const items = Array.from(document.querySelectorAll('.masonry-item'));
    const lightbox = document.getElementById('lightbox');
    const content  = document.getElementById('lightbox-content');
    const caption  = document.getElementById('lightbox-caption');
    const thumbs   = document.getElementById('lightbox-thumbnails');
    let current    = 0;

    function buildThumbs() {
        thumbs.innerHTML = '';
        items.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'thumb-item' + (i === current ? ' active' : '');
            const img = item.querySelector('img');
            const t = document.createElement('img');
            t.src = img ? img.src : '';
            t.alt = '';
            el.appendChild(t);
            el.addEventListener('click', () => { current = i; show(i); });
            thumbs.appendChild(el);
        });
    }

    function show(idx) {
        current = idx;
        const item = items[idx];
        const type    = item.dataset.type;
        const src     = item.dataset.src;
        const url     = item.dataset.url;
        const cap     = item.dataset.caption || '';

        content.innerHTML = '';
        if (type === 'IMAGE') {
            const img = document.createElement('img');
            img.src = src; img.alt = cap;
            content.appendChild(img);
        } else if (type === 'YOUTUBE') {
            const videoId = url.match(/(?:youtu\.be\/|[?&]v=)([^&?#]+)/)?.[1] || '';
            const frame = document.createElement('iframe');
            frame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            frame.allow = 'autoplay; fullscreen';
            frame.allowFullscreen = true;
            content.appendChild(frame);
        }

        caption.textContent = cap;
        lightbox.classList.add('active');

        document.querySelectorAll('.thumb-item').forEach((t, i) => {
            t.classList.toggle('active', i === idx);
        });

        const active = thumbs.querySelectorAll('.thumb-item')[idx];
        if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    items.forEach((item, i) => item.addEventListener('click', () => {
        buildThumbs();
        show(i);
    }));

    document.getElementById('lightbox-close').addEventListener('click', () => {
        lightbox.classList.remove('active');
        content.innerHTML = '';
    });

    document.getElementById('lightbox-prev').addEventListener('click', () =>
        show((current - 1 + items.length) % items.length));

    document.getElementById('lightbox-next').addEventListener('click', () =>
        show((current + 1) % items.length));

    document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'ArrowLeft')  show((current - 1 + items.length) % items.length);
        if (e.key === 'ArrowRight') show((current + 1) % items.length);
        if (e.key === 'Escape')     { lightbox.classList.remove('active'); content.innerHTML = ''; }
    });
})();
</script>
</th:block>
</body>
</html>
