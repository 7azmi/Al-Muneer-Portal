<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Availability</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section" id="availability-page">
        <div class="section-container">
            <div class="section-header">
                <h1 class="section-title">Check Availability</h1>
                <p class="section-subtitle">See which dates are open for your event</p>
            </div>

            <div class="calendar-wrapper">
                <div id="visitor-calendar"></div>
            </div>
        </div>
    </section>
</main>

<script layout:fragment="scripts">
    document.addEventListener('DOMContentLoaded', () => {
        initCalendar('visitor-calendar',
            [[${currentYear}]], [[${currentMonth}]], false);
    });
</script>
</body>
</html>
