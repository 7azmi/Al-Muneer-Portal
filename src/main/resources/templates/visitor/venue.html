<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Venue Info</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section venue-hero" id="venue-info">
        <div class="section-container">
            <div class="section-header">
                <h1 class="section-title">Al-Muneer Hall</h1>
                <p class="section-subtitle">Weddings &amp; Events Venue</p>
            </div>

            <div class="admin-panel" th:if="${venue != null}">
                <h3 class="admin-panel-title">About the Venue</h3>
                <p th:text="${venue.description}" style="line-height: 1.8; color: var(--color-text-muted);">Description</p>
            </div>

            <div class="venue-details" th:if="${venue != null}">
                <div class="venue-detail-card">
                    <div class="venue-detail-icon">📍</div>
                    <div class="venue-detail-label">Location</div>
                    <div class="venue-detail-value" th:text="${venue.location ?: 'Ibb, Yemen'}">Location</div>
                </div>
                <div class="venue-detail-card">
                    <div class="venue-detail-icon">👥</div>
                    <div class="venue-detail-label">Capacity</div>
                    <div class="venue-detail-value" th:text="${venue.capacity != null ? venue.capacity + ' Guests' : 'Contact us'}">Capacity</div>
                </div>
                <div class="venue-detail-card">
                    <div class="venue-detail-icon">📞</div>
                    <div class="venue-detail-label">Contact</div>
                    <div class="venue-detail-value" th:text="${venue.contactInfo ?: 'Contact us'}">Contact</div>
                </div>
            </div>

            <div class="admin-panel mt-8" th:if="${venue != null and venue.services != null}">
                <h3 class="admin-panel-title">Services We Offer</h3>
                <p th:text="${venue.services}" style="line-height: 1.8; color: var(--color-text-muted);">Services</p>
            </div>

            <div class="text-center mt-8">
                <a href="/calendar" class="btn btn-primary">Check Availability</a>
                <a href="/pricing" class="btn btn-outline" style="margin-left: 1rem;">View Pricing</a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
